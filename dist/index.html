<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <div class="input-group">
            <span>New task: </span>
            <input id="taskInput" type="text">
            <button id="addBtn">Add</button>
        </div>
        <ol id="taskList">
            <li>Clean bathroom <button class="done-btn">X</button></li>
            <li>Study for big exam <button class="done-btn">X</button></li>
            <li>Feed fish <button class="done-btn">X</button></li>
        </ol>
    </div>
    <script src="script.js"></script>
</body>
</html>
